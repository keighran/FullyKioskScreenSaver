<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepali Patro Clock - A.D. & B.S.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Noto+Sans+Devanagari:wght@100..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --accent: #ffdd00;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: "Outfit", "Noto Sans Devanagari", sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .clock {
            font-size: 18vw;
            line-height: 1;
            font-weight: 800;
            margin-bottom: 1.5rem;
            letter-spacing: -2px;
            transition: margin 0.5s ease-in-out;
            display: flex;
            align-items: baseline;
            justify-content: center;
        }

        .ampm {
            font-size: 0.35em;
            margin-left: 1vw;
            font-weight: 400;
            opacity: 0.8;
            letter-spacing: 0;
        }

        .date-container {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .date-row {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* English Date Styling (Now on Top) */
        .date-ad {
            font-size: 3vw;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            margin-bottom: 0.2rem;
        }

        /* Nepali Date Styling (Now on Bottom) */
        .date-bs {
            font-size: 4.5vw;
            font-weight: 500;
            font-family: "Noto Sans Devanagari", sans-serif;
            color: var(--text-primary);
        }

        @media (max-width: 768px) {
            .clock { font-size: 25vw; }
            .date-ad { font-size: 5vw; }
            .date-bs { font-size: 8vw; }
        }
    </style>
</head>
<body>

    <div class="clock" id="clock">
        <span id="time-digits">00:00</span>
        <span class="ampm" id="ampm">AM</span>
    </div>
    
    <div class="date-container">
        <!-- English Date First -->
        <div class="date-row">
            <div class="date-ad" id="date-ad"></div>
        </div>
        <!-- Nepali Date Second -->
        <div class="date-row">
            <div class="date-bs" id="date-bs"></div>
        </div>
    </div>

    <script>
        // Nepali Calendar Data (Bikram Sambat)
        const bsData = {
            2080: [31, 32, 31, 32, 31, 30, 30, 30, 29, 29, 30, 30],
            2081: [31, 32, 31, 32, 31, 30, 30, 30, 29, 30, 29, 31],
            2082: [30, 32, 31, 32, 31, 30, 30, 30, 29, 30, 30, 30],
            2083: [31, 31, 32, 31, 31, 31, 30, 29, 30, 30, 30, 30],
            2084: [31, 31, 32, 31, 31, 31, 30, 29, 30, 30, 30, 30],
            2085: [31, 32, 31, 32, 31, 30, 30, 30, 29, 29, 30, 30],
            2086: [31, 32, 31, 32, 31, 30, 30, 30, 29, 30, 29, 31],
            2087: [30, 32, 31, 32, 31, 30, 30, 30, 29, 30, 30, 30],
            2088: [31, 31, 32, 31, 31, 31, 30, 29, 30, 30, 30, 30],
            2089: [31, 31, 32, 31, 31, 31, 30, 29, 30, 30, 30, 30],
            2090: [31, 32, 31, 32, 31, 30, 30, 30, 29, 29, 30, 30]
        };

        const bsMonths = ['वैशाख', 'जेठ', 'असार', 'साउन', 'भदौ', 'असोज', 'कात्तिक', 'मंसिर', 'पुस', 'माघ', 'फागुन', 'चैत'];
        const bsDays = ['आइतवार', 'सोमवार', 'मङ्गलवार', 'बुधवार', 'बिहिवार', 'शुक्रवार', 'शनिवार'];
        
        const adMonths = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const adDays = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

        function toNpNum(num) {
            const map = {'0':'०','1':'१','2':'२','3':'३','4':'४','5':'५','6':'६','7':'७','8':'८','9':'९'};
            return String(num).replace(/[0-9]/g, d => map[d]);
        }

        const refAd = new Date("2023-04-14");
        const refBsYear = 2080;

        function getNepaliDate(now) {
            let diffTime = now.getTime() - refAd.getTime();
            let diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            let currYear = refBsYear;
            let currMonth = 0; 
            let currDay = 1;

            if (diffDays >= 0) {
                while (diffDays > 0) {
                    let daysInMonth = bsData[currYear][currMonth];
                    if (diffDays >= daysInMonth) {
                        diffDays -= daysInMonth;
                        currMonth++;
                        if (currMonth > 11) {
                            currMonth = 0;
                            currYear++;
                        }
                    } else {
                        currDay += diffDays;
                        diffDays = 0;
                    }
                }
            }
            
            return {
                year: currYear,
                month: bsMonths[currMonth],
                day: currDay,
                dayName: bsDays[now.getDay()]
            };
        }

        function update() {
            const now = new Date();
            
            // 12-Hour Time Format
            let hours = now.getHours();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12; 
            const h = String(hours).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            
            document.getElementById('time-digits').textContent = `${h}:${m}`;
            document.getElementById('ampm').textContent = ampm;

            // Proper Nepali Date (B.S.)
            const bs = getNepaliDate(now);
            document.getElementById('date-bs').textContent = 
                `${bs.dayName}, ${bs.month} ${toNpNum(bs.day)}, ${toNpNum(bs.year)} वि.सं.`;

            // English Date (A.D.)
            const dayEn = adDays[now.getDay()];
            const monthEn = adMonths[now.getMonth()];
            document.getElementById('date-ad').textContent = 
                `${dayEn}, ${monthEn} ${now.getDate()}, ${now.getFullYear()} A.D.`;
        }

        function shiftUI() {
            const clock = document.getElementById('clock');
            clock.style.marginTop = clock.style.marginTop === '10px' ? '0px' : '10px';
        }

        setInterval(update, 1000);
        setInterval(shiftUI, 300000);
        update();
    </script>
</body>
</html>
