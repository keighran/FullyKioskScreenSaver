<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepali Patro Clock - A.D. & B.S.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&family=Outfit:wght@100..900&family=Noto+Sans+Devanagari:wght@100..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.85);
            --overlay-bg: rgba(0, 0, 0, 0.4);
            --blur-amount: 15px;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111; /* Dark fallback */
            font-family: "Outfit", sans-serif;
            font-optical-sizing: auto;
            font-style: normal;
        }

        /* Fullscreen Background Image */
        #background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
            opacity: 0; /* Start hidden for fade-in */
            transition: opacity 1.5s ease-in-out;
            background-color: #000;
        }

        /* Centered Glass Overlay */
        .main-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            text-align: center;
        }

        .content-card {
            background: var(--overlay-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            padding: 3rem 5rem;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.6);
            max-width: 90%;
        }

        .clock {
            font-size: 15vw; 
            line-height: 1;
            font-weight: 600;
            margin-bottom: 0rem;
            letter-spacing: -2px;
            display: flex;
            align-items: baseline;
            justify-content: center;
            color: var(--text-primary);
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .ampm {
            font-size: 0.35em;
            margin-left: 1.5vw;
            font-weight: 600;
            opacity: 0.9;
        }

        .date-container {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            margin-top: 1rem;
        }

        .date-ad {
            font-size: 4vw;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .date-bs {
            font-size: 4.5vw;
            font-weight: 600;
            font-family: "Noto Sans Devanagari", sans-serif;
            color: var(--text-primary);
            margin-top: 0.5rem;
        }

        @media (max-width: 768px) {
            .content-card { padding: 2rem 3rem; border-radius: 30px; }
            .clock { font-size: 22vw; }
            .date-ad { font-size: 6vw; }
            .date-bs { font-size: 7vw; }
        }
    </style>
</head>
<body>

    <div id="background"></div>

    <div class="main-container">
        <div class="content-card">
            <div class="clock" id="clock">
                <span id="time-digits">00:00</span>
                <span class="ampm" id="ampm">AM</span>
            </div>
            
            <div class="date-container">
                <div class="date-ad" id="date-ad"></div>
                <div class="date-bs" id="date-bs"></div>
            </div>
        </div>
    </div>

    <script>
        // Using the access key provided
        const ACCESS_KEY = "8wxRbzWo1ESvwglfKlhJFyXm8MB6gZ3KFne9Ol-QIP0";

        async function fetchWallpaper() {
            const bgElement = document.getElementById('background');
            try {
                // Fetch random landscape photo
                const response = await fetch(`https://api.unsplash.com/photos/random?client_id=${ACCESS_KEY}&query=landscape,nature,night,minimal&orientation=landscape`);
                
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                const imageUrl = data.urls.full || data.urls.regular;
                
                // Create a temporary image object to "pre-warm" the cache
                const img = new Image();
                img.src = imageUrl;
                img.onload = () => {
                    bgElement.style.backgroundImage = `url('${imageUrl}')`;
                    bgElement.style.opacity = 1; // Fade in once loaded
                };
            } catch (error) {
                console.error("Failed to fetch wallpaper:", error);
                // Fallback style if API fails or blocks request
                bgElement.style.background = "linear-gradient(45deg, #0f2027, #203a43, #2c5364)";
                bgElement.style.opacity = 1;
            }
        }

        // Nepali Calendar Data
        const bsData = {
            2080: [31, 32, 31, 32, 31, 30, 30, 30, 29, 29, 30, 30],
            2081: [31, 32, 31, 32, 31, 30, 30, 30, 29, 30, 29, 31],
            2082: [30, 32, 31, 32, 31, 30, 30, 30, 29, 30, 30, 30],
            2083: [31, 31, 32, 31, 31, 31, 30, 29, 30, 30, 30, 30],
            2084: [31, 31, 32, 31, 31, 31, 30, 29, 30, 30, 30, 30],
            2085: [31, 32, 31, 32, 31, 30, 30, 30, 29, 29, 30, 30],
            2086: [31, 32, 31, 32, 31, 30, 30, 30, 29, 30, 29, 31],
            2087: [30, 32, 31, 32, 31, 30, 30, 30, 29, 30, 30, 30],
            2088: [31, 31, 32, 31, 31, 31, 30, 29, 30, 30, 30, 30],
            2089: [31, 31, 32, 31, 31, 31, 30, 29, 30, 30, 30, 30],
            2090: [31, 32, 31, 32, 31, 30, 30, 30, 29, 29, 30, 30]
        };

        const bsMonths = ['वैशाख', 'जेठ', 'असार', 'साउन', 'भदौ', 'असोज', 'कात्तिक', 'मंसिर', 'पुस', 'माघ', 'फागुन', 'चैत'];
        const bsDays = ['आइतवार', 'सोमवार', 'मङ्गलवार', 'बुधवार', 'बिहिवार', 'शुक्रवार', 'शनिवार'];
        const adMonths = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const adDays = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

        function toNpNum(num) {
            const map = {'0':'०','1':'१','2':'२','3':'३','4':'४','5':'५','6':'६','7':'७','8':'८','9':'९'};
            return String(num).replace(/[0-9]/g, d => map[d]);
        }

        const refAd = new Date("2023-04-14");
        const refBsYear = 2080;

        function getNepaliDate(now) {
            let diffTime = now.getTime() - refAd.getTime();
            let diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            let currYear = refBsYear;
            let currMonth = 0; 
            let currDay = 1;

            if (diffDays >= 0) {
                while (diffDays > 0) {
                    let daysInMonth = bsData[currYear][currMonth];
                    if (diffDays >= daysInMonth) {
                        diffDays -= daysInMonth;
                        currMonth++;
                        if (currMonth > 11) {
                            currMonth = 0;
                            currYear++;
                        }
                    } else {
                        currDay += diffDays;
                        diffDays = 0;
                    }
                }
            }
            return { year: currYear, month: bsMonths[currMonth], day: currDay, dayName: bsDays[now.getDay()] };
        }

        function update() {
            const now = new Date();
            let hours = now.getHours();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12; 
            const h = String(hours).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('time-digits').textContent = `${h}:${m}`;
            document.getElementById('ampm').textContent = ampm;

            const bs = getNepaliDate(now);
            document.getElementById('date-bs').textContent = `${bs.dayName}, ${bs.month} ${toNpNum(bs.day)}, ${toNpNum(bs.year)}`;
            
            const dayEn = adDays[now.getDay()];
            const monthEn = adMonths[now.getMonth()];
            document.getElementById('date-ad').textContent = `${dayEn}, ${monthEn} ${now.getDate()}, ${now.getFullYear()} A.D.`;
        }

        // Initialize Wallpaper
        fetchWallpaper();
        
        // Initial Clock Run
        update();
        
        // Intervals
        setInterval(update, 1000);
        setInterval(fetchWallpaper, 60 * 60 * 1000); // New wallpaper every hour
    </script>
</body>
</html>
